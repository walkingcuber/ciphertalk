<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 CipherTalk - 加密聊天室</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Helvetica, Arial, sans-serif; }
        body { background-color: #eef2f3; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .chat-app { width: 100%; max-width: 480px; height: 90vh; background: #fff; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        
        /* 頂部狀態欄 */
        .chat-header { background: #1e293b; color: #fff; padding: 15px 20px; display: flex; flex-direction: column; gap: 4px; border-bottom: 1px solid #334155; }
        .chat-header h2 { font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .user-status { font-size: 13px; color: #94a3b8; }

        /* 主功能切換區 / 隱藏面板 */
        .config-panel { background: #f8fafc; padding: 15px; border-bottom: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 10px; font-size: 14px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; outline: none; }
        input:focus { border-color: #3b82f6; }
        
        button { background: #3b82f6; color: white; border: none; padding: 10px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px; transition: background 0.2s; }
        button:hover { background: #2563eb; }
        .btn-register { background: #10b981; }
        .btn-register:hover { background: #059669; }

        /* 備份金鑰黃色區域 */
        #keyBox { background: #fef08a; padding: 12px; border-radius: 8px; border: 1px solid #fef08a; display: none; }
        .key-text { width: 100%; height: 60px; font-family: monospace; font-size: 11px; margin-top: 5px; padding: 5px; border: 1px solid #eab308; background: #fffdf5; resize: none; }

        /* 💬 聊天訊息滾動區域 */
        .chat-container { flex: 1; padding: 20px; background: #f1f5f9; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* 對話氣泡樣式 */
        .msg-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-wrapper.me { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }
        
        .sender-name { font-size: 11px; color: #64748b; margin-bottom: 3px; padding: 0 4px; }
        
        .bubble { padding: 10px 16px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .me .bubble { background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: white; color: #1e293b; border-bottom-left-radius: 4px; }
        .error-bubble { background: #fecaca !important; color: #991b1b !important; font-style: italic; }

        /* 📥 下方發送欄 */
        .chat-footer { padding: 15px; background: #fff; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: center; }
        .chat-footer input { padding: 12px; border-radius: 20px; }
        .chat-footer button { border-radius: 20px; padding: 12px 24px; }
    </style>
</head>
<body>

<div class="chat-app">
    <div class="chat-header">
        <h2>🔒 CipherTalk Messenger</h2>
        <div class="user-status" id="lblMyStatus">當前未登入，請先註冊/貼上私鑰</div>
    </div>

    <div class="config-panel">
        <div class="input-group">
            <input type="email" id="myEmail" placeholder="我的 Email 帳號">
            <button id="btnRegister" class="btn-register">✨ 註冊新帳號</button>
        </div>
        
        <div id="keyBox">
            <span style="color:#854d0e; font-weight:bold; font-size:12px;">⚠️ 請複製並保管您的解密私鑰：</span>
            <textarea id="txtPrivateKey" class="key-text" readonly></textarea>
        </div>

        <div class="input-group">
            <input type="text" id="inputPrivateKey" placeholder="貼上私鑰 (已註冊過者請在此貼上)">
            <button id="btnFetch">📥 同步並解密訊息</button>
        </div>
    </div>

    <div class="chat-container" id="chatHistory">
        <div style="text-align: center; color: #94a3b8; font-size: 13px; margin-top: 20px;">
            請完成上方註冊或貼上私鑰，並指定下方收件人開始安全對話。
        </div>
    </div>

    <div class="chat-footer">
        <input type="email" id="targetEmail" placeholder="對方的 Email" style="max-width: 130px; border-radius: 8px;">
        <input type="text" id="msgContent" placeholder="輸入安全的加密訊息...">
        <button id="btnSend">發送</button>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
