<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 CipherTalk Messenger v2.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/forge/0.10.0/forge.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f2f5; color: #1c1e21; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .messenger-container { display: flex; width: 95vw; max-width: 1000px; height: 85vh; background: #fff; border-radius: 12px; box-shadow: 0 12px 28px rgba(0,0,0,0.1); overflow: hidden; }
        
        /* 左側欄 */
        .sidebar { width: 320px; background: #fff; border-right: 1px solid #e4e6eb; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #e4e6eb; background: #1e293b; color: white; }
        .sidebar-header h3 { font-size: 20px; margin-bottom: 8px; }
        .user-status { font-size: 12px; color: #cbd5e1; word-break: break-all; }
        
        .config-area { padding: 12px; background: #f8fafc; border-bottom: 1px solid #e4e6eb; display: flex; flex-direction: column; gap: 8px; }
        .auth-box { border: 1px solid #e4e6eb; padding: 10px; border-radius: 8px; background: #fff; margin-bottom: 5px; }
        .auth-title { font-size: 12px; font-weight: bold; color: #475569; margin-bottom: 6px; }
        
        input { width: 100%; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 13px; margin-bottom: 6px; outline: none; }
        input:focus { border-color: #0084ff; }
        button { width: 100%; background: #0084ff; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px; }
        button:hover { background: #006dd6; }

        /* 朋友清單 */
        .friend-list-title { padding: 12px 16px 4px 16px; font-size: 12px; font-weight: bold; color: #65676b; text-transform: uppercase; }
        .friend-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 4px; }
        .friend-item { padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.2s; }
        .friend-item:hover { background: #f2f3f5; }
        .friend-item.active { background: #e7f3ff; color: #1877f2; font-weight: bold; }
        .friend-avatar { width: 36px; height: 36px; background: #1e293b; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; font-weight: bold; }
        .friend-info { flex: 1; min-width: 0; }
        .friend-info div { font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 右側欄 */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 16px; border-bottom: 1px solid #e4e6eb; font-size: 16px; font-weight: bold; display: flex; align-items: center; background: #fcfcfc; }
        
        .messages-container { flex: 1; padding: 20px; background: #f0f2f5; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }
        
        .bubble { max-width: 65%; padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.4; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
        .me .bubble { background: #0084ff; color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: white; color: #050505; border-bottom-left-radius: 4px; }

        /* 下方輸入欄 */
        .input-bar { padding: 16px; border-top: 1px solid #e4e6eb; display: flex; gap: 12px; background: #fff; align-items: center; }
        .input-bar input { border-radius: 20px; padding: 10px 16px; background: #f0f2f5; border: none; margin-bottom: 0; }
    </style>
</head>
<body>

<div class="messenger-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h3>CipherTalk</h3>
            <div id="lblMyStatus">🔴 請先註冊或登入</div>
        </div>
        
        <div class="config-area">
            <div class="auth-box">
                <div class="auth-title">🆕 註冊新帳號</div>
                <input type="email" id="regEmail" placeholder="輸入我的 Email">
                <input type="password" id="regPassword" placeholder="設定密碼 (用來鎖定金鑰)">
                <button id="btnRegister" style="background:#10b981;">完成註冊 (自動託管金鑰)</button>
            </div>
            
            <div class="auth-box">
                <div class="auth-title">🔑 密碼驗證登入</div>
                <input type="email" id="loginEmail" placeholder="我的 Email">
                <input type="password" id="loginPassword" placeholder="輸入個人密碼">
                <button id="btnLogin">登入並即時同步訊息</button>
            </div>
        </div>
        
        <div class="friend-list-title">聯絡人名單</div>
        <div class="friend-list" id="friendList">
            <div style="text-align:center; color:#8e8e93; font-size:12px; margin-top:20px;">請先登入以載入朋友名單</div>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-header" id="chatTitle">💬 請選擇左側聯絡人開始聊天</div>
        <div class="messages-container" id="chatHistory">
            <div style="text-align: center; color: #8e8e93; margin-top: 50px; font-size: 14px;">沒有選取的對話</div>
        </div>
        <div class="input-bar">
            <input type="text" id="msgContent" placeholder="輸入安全的加密訊息 (按 Enter 發送)..." disabled>
            <button id="btnSend" disabled style="border-radius: 20px; padding: 10px 20px; width:auto;">發送</button>
        </div>
    </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
